# AI Context Configuration for @voltrix/decorator
# High-performance decorator system for Voltrix framework

project:
  name: "@voltrix/decorator"
  owner: "@zenozaga"
  description: "TypeScript decorator system for Voltrix framework with extensible patterns and dependency injection"
  type: "typescript-package"
  parent: "voltrix"
  
context:
  version: "0.1.0"
  architecture: "decorator/extensible"
  
behavior:
  agent_onboarding: true
  auto_discovery: true
  task_execution: true
  performance_focused: true
  extensibility_first: true
  
paths:
  tasks: "./tasks/"
  knowledge: "./knowledge/"
  apis: "./apis/"
  templates: "./templates/"
  rules: "./rules.md"

package_info:
  location: "packages/decorator"
  main_entry: "src/index.ts"
  dependencies:
    - "reflect-metadata"
    - "@voltrix/express"
    - "zod"
    - "class-validator"
  
decorator_categories:
  - "HTTP Methods (@GET, @POST, @PUT, @DELETE, @PATCH, @OPTIONS)"
  - "Security (@Role, @Scope, @Permission, @Auth, @RateLimit)"
  - "Middleware (@Middleware, @CORS, @Logger, @Compression)"
  - "Validation (@Body, @Query, @Params, @Header, @Cookie)"
  - "File Handling (@FileStream, @Upload, @Download)"
  - "Application (@VoltrixApp, @Controller, @Service)"
  - "Dependency Injection (@Injectable, @Inject, @Singleton)"

conventions:
  code_style: "typescript/strict"
  testing: "vitest"
  bundling: "tsup"
  linting: "eslint + prettier"
  documentation: "markdown + jsdoc"
  
features:
  - "Extensible decorator pattern with .extend() method"
  - "High-performance dependency injection container"
  - "Type-safe metadata reflection system"
  - "Multi-validator support (Zod, class-validator, JSON Schema)"
  - "Built-in security and middleware decorators"
  - "File streaming with multiple storage backends"
  - "CRUD utilities and router helpers"
  - "Application lifecycle management"

performance_optimizations:
  - "Metadata caching with LRU eviction"
  - "Lazy decorator initialization"
  - "Optimized reflection with symbol keys"
  - "Memory-efficient validation pipelines"
  - "Singleton pattern for container instances"
  - "Pre-compiled validation functions"