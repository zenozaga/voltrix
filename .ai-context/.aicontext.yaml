# AI Context Configuration for Voltrix
# Ultra-fast TypeScript framework with decorator-based architecture and hyper-express patterns

project:
  name: "voltrix"
  owner: "@zenozaga"
  description: "High-performance TypeScript framework with decorator-based architecture following hyper-express patterns. Features ultra-fast HTTP routing, dependency injection, and zero-duplication design patterns."
  type: "typescript-monorepo"
  
context:
  version: "1.0.0"
  architecture: "monorepo/performance-first/decorator-driven"
  philosophy: "Maximum performance with zero code duplication, real HTTP testing, and centralized type systems"
  
behavior:
  agent_onboarding: true
  auto_discovery: true
  task_execution: true
  performance_focused: true
  test_driven_development: true
  zero_mock_policy: true  # All tests must use real HTTP requests, no mocks
  
paths:
  tasks: "./tasks/"
  knowledge: "./knowledge/"
  apis: "./apis/"
  templates: "./templates/"
  goals: "./goals/"
  rules: "./rules.md"

monorepo:
  tool: "pnpm"
  packages:
    - "@voltrix/decorator"   # Core decorator system with centralized types
    - "@voltrix/express"     # Express integration layer
    - "@voltrix/injector"    # Dependency injection system
    - "@voltrix/mock"        # Testing utilities (NO MOCKS in real tests)
    - "@voltrix/benchmarks"  # Performance testing and comparison

conventions:
  code_style: "typescript/ultra-performance"
  testing: "vitest/real-http-only"
  bundling: "tsup"
  linting: "eslint + prettier"
  documentation: "markdown + jsdoc"
  package_manager: "pnpm"
  type_system: "centralized/zero-duplication"
  
features:
  - "Decorator-based architecture with VoltrixApp, VoltrixModule, VoltrixController"
  - "Centralized type system in decorators/types for zero duplication"
  - "Ultra-fast HTTP routing with factory pattern decorators (createRouteDecorator)"
  - "Real HTTP testing - NO MOCKS policy, all tests use actual servers"
  - "Dependency injection with optimized container system"
  - "Hyper-express compatibility patterns for maximum performance"
  - "Parameter injection with @Body, @Param, @Query decorators"
  - "Role and scope-based authorization decorators"
  - "Zero-copy optimizations in request/response handling"
  - "Factory pattern for unlimited custom decorators"
  - "Lifecycle management with onPrepare, onReady, onShutdown hooks"
  - "Application processor with createApplication for real server instances"

performance_goals:
  - "Sub-millisecond decorator application (100 decorators in <100ms)"
  - "Zero code duplication across all decorator implementations"
  - "Centralized types for maximum TypeScript optimization"
  - "Real HTTP request handling with actual Express servers in tests"
  - "Ultra-fast route registration and metadata processing"
  - "Minimal memory overhead with object pooling patterns"

testing_philosophy:
  policy: "REAL_HTTP_ONLY"
  description: "All tests must use real HTTP requests and actual server instances"
  forbidden:
    - "vi.fn() mocks for HTTP handlers"
    - "Fake request/response objects"
    - "Simulated server behavior"
  required:
    - "Real Express servers with actual ports"
    - "fetch() for HTTP requests in tests"
    - "createApplication() for server instantiation"
    - "Direct handler execution for unit tests"

current_status:
  version: "1.0.0"
  last_updated: "2025-10-21"
  milestone: "Decorator System with Real HTTP Testing"
  test_coverage: "100% with real HTTP requests"
  test_framework: "vitest + real Express servers"
  tests_passing: "15/15 (voltrix.optimized.test.ts)"
  build_system: "tsup"
  type_system: "Centralized in decorators/types/voltrix.types.ts"
  
priorities:
  critical:
    - "Maintain 100% real HTTP testing - NO MOCKS policy"
    - "All new features MUST have comprehensive tests with real servers"
    - "Maximum performance optimization using latest algorithms"
    - "Zero code duplication across all implementations"
  high:
    - "Centralized type definitions for all new features"
    - "Factory patterns for extensible decorator systems"
    - "Performance benchmarks for every new feature"
    - "Documentation with real working examples"
  medium:
    - "Advanced decorator patterns and metadata processing"
    - "Enhanced error handling with typed exceptions"
    - "CI/CD pipeline for continuous performance testing"
  low:
    - "Additional utility decorators and helpers"
    - "Community examples and templates"
    - "Advanced monitoring and metrics collection"

mandatory_rules:
  feature_development:
    - "EVERY new feature MUST have comprehensive tests"
    - "ALL tests MUST use real HTTP requests, servers, and fetch()"
    - "NO vi.fn() mocks or fake objects allowed in HTTP tests"
    - "Performance MUST be optimized using latest algorithms and patterns"
    - "Types MUST be centralized in appropriate /types directories"
    - "Zero code duplication - use factory patterns and inheritance"
  
  performance_requirements:
    - "Sub-100ms execution for performance-critical operations"
    - "Memory usage optimization with object pooling"
    - "CPU efficiency using modern JavaScript features"
    - "Benchmark every performance-critical feature"
    - "Profile and measure before/after optimizations"
  
  code_quality:
    - "TypeScript strict mode with no any types"
    - "Comprehensive JSDoc documentation"
    - "Consistent naming conventions across packages"
    - "Error handling with typed custom exceptions"
    - "Lifecycle management for all stateful components"