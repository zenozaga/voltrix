# Voltrix MCP Package API Specification

openapi: 3.0.0
info:
  title: Voltrix MCP Package API
  description: Model Context Protocol implementation for Voltrix Framework
  version: 1.0.0
  contact:
    name: Voltrix MCP Team
    url: https://github.com/zenozaga/voltrix

servers:
  - url: ws://localhost:3000/mcp
    description: WebSocket MCP Server
  - url: http://localhost:3000/mcp
    description: HTTP MCP Server

paths:
  /mcp/initialize:
    post:
      summary: Initialize MCP connection
      description: Initialize a new MCP session with the server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitializeRequest'
      responses:
        '200':
          description: Connection initialized successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitializeResponse'
        '400':
          description: Invalid initialization parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpError'

  /mcp/resources:
    get:
      summary: List available resources
      description: Get a list of all available MCP resources
      parameters:
        - name: uri
          in: query
          description: Filter resources by URI pattern
          schema:
            type: string
            example: "file://*"
        - name: type
          in: query
          description: Filter resources by type
          schema:
            type: string
            enum: [file, database, api, memory, stream]
      responses:
        '200':
          description: List of available resources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceListResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpError'

  /mcp/resources/read:
    post:
      summary: Read resource content
      description: Read the content of a specific MCP resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceReadRequest'
      responses:
        '200':
          description: Resource content retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceReadResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpError'

  /mcp/tools:
    get:
      summary: List available tools
      description: Get a list of all available MCP tools
      responses:
        '200':
          description: List of available tools
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolListResponse'

  /mcp/tools/call:
    post:
      summary: Execute a tool
      description: Execute a specific MCP tool with provided arguments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolCallRequest'
      responses:
        '200':
          description: Tool executed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolCallResponse'
        '400':
          description: Invalid tool arguments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpError'

  /mcp/prompts:
    get:
      summary: List available prompts
      description: Get a list of all available prompt templates
      responses:
        '200':
          description: List of available prompts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptListResponse'

  /mcp/prompts/get:
    post:
      summary: Get prompt template
      description: Retrieve and render a prompt template with arguments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptGetRequest'
      responses:
        '200':
          description: Prompt template retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptGetResponse'

  /mcp/sampling/create:
    post:
      summary: Create AI completion
      description: Request AI model completion using MCP sampling
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SamplingCreateRequest'
      responses:
        '200':
          description: Completion generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SamplingCreateResponse'

components:
  schemas:
    InitializeRequest:
      type: object
      properties:
        protocolVersion:
          type: string
          example: "2024-11-05"
        capabilities:
          type: object
          properties:
            roots:
              type: object
              properties:
                listChanged:
                  type: boolean
            sampling:
              type: object
        clientInfo:
          type: object
          properties:
            name:
              type: string
              example: "voltrix-mcp-client"
            version:
              type: string
              example: "1.0.0"
      required:
        - protocolVersion
        - capabilities
        - clientInfo

    InitializeResponse:
      type: object
      properties:
        protocolVersion:
          type: string
          example: "2024-11-05"
        capabilities:
          type: object
          properties:
            logging:
              type: object
            resources:
              type: object
              properties:
                subscribe:
                  type: boolean
                listChanged:
                  type: boolean
            tools:
              type: object
            prompts:
              type: object
              properties:
                listChanged:
                  type: boolean
        serverInfo:
          type: object
          properties:
            name:
              type: string
              example: "voltrix-mcp-server"
            version:
              type: string
              example: "1.0.0"
      required:
        - protocolVersion
        - capabilities
        - serverInfo

    ResourceListResponse:
      type: object
      properties:
        resources:
          type: array
          items:
            $ref: '#/components/schemas/Resource'

    Resource:
      type: object
      properties:
        uri:
          type: string
          example: "file://documents/readme.txt"
        name:
          type: string
          example: "README Documentation"
        description:
          type: string
          example: "Project documentation and setup instructions"
        mimeType:
          type: string
          example: "text/plain"
        annotations:
          type: object
          additionalProperties: true
      required:
        - uri
        - name

    ResourceReadRequest:
      type: object
      properties:
        uri:
          type: string
          example: "file://documents/readme.txt"
        range:
          type: object
          properties:
            start:
              type: integer
              example: 0
            end:
              type: integer
              example: 1000
      required:
        - uri

    ResourceReadResponse:
      type: object
      properties:
        contents:
          type: array
          items:
            $ref: '#/components/schemas/ResourceContent'

    ResourceContent:
      type: object
      properties:
        uri:
          type: string
          example: "file://documents/readme.txt"
        mimeType:
          type: string
          example: "text/plain"
        text:
          type: string
          example: "# Project Documentation\n\nThis is the README file..."
        blob:
          type: string
          format: base64
          description: "Base64 encoded binary content"
      required:
        - uri

    ToolListResponse:
      type: object
      properties:
        tools:
          type: array
          items:
            $ref: '#/components/schemas/Tool'

    Tool:
      type: object
      properties:
        name:
          type: string
          example: "create_file"
        description:
          type: string
          example: "Create a new file with specified content"
        inputSchema:
          type: object
          description: "JSON Schema for tool input validation"
          example:
            type: "object"
            properties:
              path:
                type: "string"
                description: "File path"
              content:
                type: "string"
                description: "File content"
            required: ["path", "content"]
      required:
        - name
        - description
        - inputSchema

    ToolCallRequest:
      type: object
      properties:
        name:
          type: string
          example: "create_file"
        arguments:
          type: object
          example:
            path: "/tmp/test.txt"
            content: "Hello, World!"
      required:
        - name

    ToolCallResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ToolResult'
        isError:
          type: boolean
          default: false

    ToolResult:
      type: object
      properties:
        type:
          type: string
          enum: [text, image, resource]
        text:
          type: string
          example: "File created successfully"
        data:
          type: string
          format: base64
          description: "Base64 encoded binary data"
        annotations:
          type: object
          additionalProperties: true

    PromptListResponse:
      type: object
      properties:
        prompts:
          type: array
          items:
            $ref: '#/components/schemas/Prompt'

    Prompt:
      type: object
      properties:
        name:
          type: string
          example: "user_summary"
        description:
          type: string
          example: "Generate a summary for a user profile"
        arguments:
          type: array
          items:
            $ref: '#/components/schemas/PromptArgument'
      required:
        - name
        - description

    PromptArgument:
      type: object
      properties:
        name:
          type: string
          example: "userId"
        description:
          type: string
          example: "The unique identifier for the user"
        required:
          type: boolean
          default: false
      required:
        - name
        - description

    PromptGetRequest:
      type: object
      properties:
        name:
          type: string
          example: "user_summary"
        arguments:
          type: object
          example:
            userId: "123"
            includeStats: true
      required:
        - name

    PromptGetResponse:
      type: object
      properties:
        description:
          type: string
          example: "Generate a summary for user 123"
        messages:
          type: array
          items:
            $ref: '#/components/schemas/PromptMessage'

    PromptMessage:
      type: object
      properties:
        role:
          type: string
          enum: [system, user, assistant]
        content:
          type: object
          properties:
            type:
              type: string
              enum: [text, image]
            text:
              type: string
            data:
              type: string
              format: base64
      required:
        - role
        - content

    SamplingCreateRequest:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/PromptMessage'
        modelPreferences:
          type: object
          properties:
            hints:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
            costPriority:
              type: number
              minimum: 0
              maximum: 1
            speedPriority:
              type: number
              minimum: 0
              maximum: 1
            intelligencePriority:
              type: number
              minimum: 0
              maximum: 1
        systemPrompt:
          type: string
        includeContext:
          type: string
          enum: [none, thisServer, allServers]
        temperature:
          type: number
          minimum: 0
          maximum: 2
        maxTokens:
          type: integer
          minimum: 1
        stopSequences:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
      required:
        - messages

    SamplingCreateResponse:
      type: object
      properties:
        role:
          type: string
          enum: [assistant]
        content:
          type: object
          properties:
            type:
              type: string
              enum: [text]
            text:
              type: string
        model:
          type: string
          example: "gpt-4"
        stopReason:
          type: string
          enum: [endTurn, stopSequence, maxTokens]

    McpError:
      type: object
      properties:
        code:
          type: integer
          example: -32602
        message:
          type: string
          example: "Invalid params"
        data:
          type: object
          properties:
            details:
              type: string
              example: "URI parameter is required"
      required:
        - code
        - message

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

security:
  - BearerAuth: []
  - ApiKeyAuth: []

tags:
  - name: Connection
    description: MCP connection management
  - name: Resources
    description: MCP resource operations
  - name: Tools
    description: MCP tool operations
  - name: Prompts
    description: MCP prompt operations
  - name: Sampling
    description: MCP AI sampling operations